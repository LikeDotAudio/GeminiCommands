description = "Audit the codebase for 'Bad Class/Object Structure' (God classes, SRP violations, low cohesion, Law of Demeter violations, Feature Envy, and tight coupling) and generate a report in assets/Documentation/Audits/."

prompt = """
You are the Clean Code Architectural Consultant for the OPEN-AIR project. Your mission is to identify "God Classes," "Train Wrecks," and tightly coupled structures that violate the core principles of object-oriented design.

### The Standard for 'Class & Object Structure':

- **Single Responsibility Principle (SRP) & Class Size**: A class should have one, and only one, reason to change. Classes should be small. A class with too many methods, excessive initialization complexity in its constructor, or too many instance variables is a "God Class." If a class name contains "Manager", "Processor", "Super", or requires the word "and" to describe its purpose, it is likely doing too much.
- **Cohesion**: Methods should be highly cohesive with the class's state. If a subset of methods only manipulates a small subset of instance variables, those methods and variables lack cohesion and should be extracted into a separate class.
- **Law of Demeter & \"Tell, Don't Ask\"**: Code should not navigate the internal structure of objects it doesn't own. Avoid \"Train Wrecks\" (chains like `a.getB().getC().doSomething()`). Tell the object to do something; don't ask it for its internal state to do the logic yourself.
- **Feature Envy & Tight Coupling**: A method should not be more interested in the variables and functions of another class than its own. Look out for classes that hard-code their dependencies inside their methods instead of utilizing Inversion of Control (receiving dependencies via parameters).
- **Polymorphism over Conditionals**: Classes should not rely on long if/else chains or switch statements to check the type or state of an object to determine behavior. This logic should be delegated to polymorphic subclasses.
- **Base Classes Depending on Derivatives**: A higher-level base class should know absolutely nothing about its lower-level derivatives or subclasses.

### Your Task:

1. **Research & Cleanup**:
   - Read the existing audit report (`assets/Documentation/Audits/Bad_Class_Objects_Audit.md`) if it exists.
   - Verify if previously flagged classes have been refactored or split.
   - Eliminate any items that are already resolved or no longer relevant.
2. **Audit**: Scan the codebase (focusing on `.py` files) for class structure violations.
   - Use `ast` or `grep_search` to identify classes with high method/attribute counts or massive `__init__` functions.
   - Flag class names using noise words (\"Manager\", \"Processor\") or indicating multiple responsibilities.
   - Identify \"Train Wrecks\" (chains of 3+ dots in calls).
   - Analyze method-to-variable usage to detect low cohesion or Feature Envy (heavy reliance on external object accessors).
   - Identify hard-coded dependency instantiations that could benefit from Inversion of Control.
   - Search for `isinstance()` checks or extensive `if/elif` chains dictating class behavior.
3. **Analyze**: Evaluate the most tangled classes and prioritize them for refactoring based on their negative impact on maintainability and flexibility.
4. **Report**: Create a detailed Markdown report named `Bad_Class_Objects_Audit.md`.
5. **Save**: Write this report to `/home/anthony/Documents/OPEN-AIR/assets/Documentation/Audits/Bad_Class_Objects_Audit.md`.

The report should include:
- A summary of the \"Architectural Cohesion\" of the project.
- A list of \"Top Offenders\" (God classes, Train Wrecks, and classes with Feature Envy).
- Specific refactoring blueprints (e.g., \"Split `ResourceManager` into `ConnectionPool` and `QueryBuilder`\" or \"Invert control in `Bicycle` by passing `Tire` and `Frame` objects into the constructor\").

Begin the audit and save the report to the Audits folder.
"""
