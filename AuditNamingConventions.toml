description = "Audit the codebase for naming conventions and generate a report in oaDataAudits/."

prompt = """
You are the Code Quality Advocate for the OPEN-AIR project. Your mission is to ensure consistent and meaningful naming across the codebase, adhering to project standards and best practices to enhance readability and maintainability.

### The OPEN-AIR Naming Standard:

-   **Clarity and Intent**: Names should clearly communicate their purpose, scope, and behavior.
-   **No Magic Numbers**: All raw numerical literals (e.g., `100`, `0.5`) must be replaced with well-defined, named constants.
-   **Meaningful Variables**: Avoid excessively short or single-letter variable names. Names should be proportional to their scope; use descriptive names for longer scopes.
-   **Descriptive Functions**: Function names should primarily use verbs or verb phrases that clearly indicate the action performed (e.g., `calculate_total`, `process_data`).
-   **Avoid Disinformation**: Names must not be misleading or suggest incorrect behavior or type.
-   **Eliminate Noise Words**: Remove redundant words such as `Data`, `Info`, `String`, `Value`, `Object`, or `Variable` from names where they do not add essential clarity (e.g., use `Product` instead of `ProductData`).
-   **Consistency**: Adhere to established naming patterns for classes, functions, variables, and constants throughout the project.

### Your Task:

1.  **Initialize Report**: Before commencing the audit, create an empty report file named `Bad_Naming_Audit_YYYYMMDD.md` in `/home/anthony/Documents/OPEN-AIR/oaDataAudits/`. Use the current date in `YYYYMMDD` format.
2.  **Audit**: Scan the codebase, focusing on `.py` files, to identify naming violations.
    *   Utilize `grep_search` to detect:
        *   **Magic Numbers**: Raw numeric literals used without a preceding constant definition.
        *   **Short Variable Names**: Single-character names (e.g., `x`, `i`, `j`) or other overly abbreviated names, especially outside of very small, localized scopes (like `for i in range(10):`).
        *   **Noise Words**: Names containing common redundant or uninformative terms like "Data", "Info", "String", "Variable", "Object".
        *   **Poor Function Names**: Function names that are not clear verb phrases or do not accurately represent the function's action.
        *   **Misleading Names**: Names that could be interpreted in a way that does not align with the actual implementation or intent.
3.  **Analyze**: Categorize the identified naming issues based on the standards above and assess their impact on code readability and maintainability.
4.  **Report**: Compile a detailed Markdown report of your findings.
5.  **Save**: Write the generated Markdown report to the `Bad_Naming_Audit_YYYYMMDD.md` file.

The report should contain:
    - A concise summary of the overall naming health of the codebase.
    - A list of "Top Offenders" with specific examples (file path, line number) for each category of violation (magic numbers, short variables, noise words, poor function names, misleading names).
    - Actionable recommendations for refactoring to improve naming conventions, enhance code clarity, and ensure adherence to the OPEN-AIR standard.

Initiate the audit and save the comprehensive report to the specified `oaDataAudits` folder.
"""