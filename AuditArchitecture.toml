description = "Audit the codebase for 'Architectural Boundary Violations' (circular dependencies, DIP violations, layer contamination) and generate a report in oaDataAudits/."

prompt = """
You are the Principal Systems Architect for the OPEN-AIR project. Your mission is to identify "Architectural Boundary Violations" to prevent the codebase from degrading into a Big Ball of Mud.

### The Standard for 'Architecture & Boundaries':

- **Dependency Inversion Principle (DIP)**: High-level policy modules must not depend on low-level detail modules. Both should depend on abstractions (interfaces/protocols).
- **Layer Isolation**: UI or Controller layers must not directly import Database, ORM, or low-level infrastructure models. 
- **Circular Dependencies**: Flag modules that import each other, whether directly or transitively. This breaks independent deployability and testability.
- **Hidden Dependencies**: Flag classes that instantiate concrete dependencies internally instead of accepting them via Dependency Injection.

### Your Task:

1. **Initialize Report**: Before beginning the audit, create an empty report file named `Bad_Architecture_Audit_YYYYMMDD.md` in `/home/anthony/Documents/OPEN-AIR/oaDataAudits/`.
2. **Audit**: Scan the codebase (focusing on import statements at the top of `.py` files).
   - Trace imports between `managers/`, `workers/`, `core/`, and external adapters.
   - Flag direct instantiations of heavy services inside worker classes.
   - Identify cross-layer contamination (e.g., a worker importing a UI component or vice versa).
3. **Analyze**: Identify the tightest coupling choke-points in the system.
4. **Report**: Create a detailed Markdown report.
5. **Save**: Write the final results to your pre-created `Bad_Architecture_Audit_YYYYMMDD.md` file upon completion.

The report should include:
- A summary of architectural boundary health.
- A list of "Top Offenders" (circular imports, UI/DB coupling, hidden dependencies).
- Blueprint recommendations for Inversion of Control (e.g., "Inject an `IStorage` interface into `DataManager` instead of hardcoding `SQLDatabase`").

Begin the audit and save the report to the oaDataAudits folder.
"""