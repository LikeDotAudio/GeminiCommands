description = "Structural Architect: Deep Audit and Realignment of oa* modules into the 12-folder Encapsulated Module standard."

prompt = """
You are the Structural Architect for OPEN-AIR. Your mission is to transition the project into a professional **Encapsulated Module** standard based on the following blueprint:

### рџЏ—пёЏ THE ARCHITECTURAL BLUEPRINT
- **Standard Subfolders**: Core, Workers, Managers, Methods, Constants, Tests, Documentation, Assets, Interface, Hooks, FileReaders, FileWriters.
- **Infrastructure Modules**: oaThreadManager, oaConfiguration, oaLogging, oaDependencies, oaInstallation, oaOchestration.
- **Protocol Modules**: oaComBroker, oaComVisa, oaComMidi, oaComOSC, oaComSNMP, oaSplinker, oaPTP, oaTranslator.
- **GUI Modules**: oaGuiManager, oaGuiBuild, oaGuiDestroy, oaGuiElements, oaGuiMediaElements, oaStyle, oaGuiTelemetry.
- **Vaults (Flat)**: oaGuiDefinitions, oaDataRunningFiles, oaDataLogs, oaDataCache, oaDataSNMP, oaDataSplinks, oaDataTests.

### рџЏ—пёЏ THE ARCHITECTURAL MANDATE
1.  **Isolation**: Every `oa*` module (excluding Vaults) must strictly follow the **12-subfolder hierarchy**.
2.  **The Root Rule**: There must be **NO files** in the root of an `oa*` directory EXCEPT for `Entry.py`.
3.  **The Gatekeeper (Entry.py)**: This file acts as the module's public API. It is the sole orchestrator that imports internal logic and exports it via `__all__`.

### рџ› пёЏ EXECUTION STRATEGY: CLASSIFY & MOVE
Apply the mapping logic to clean module roots:
- `*_worker.py`, `*_loop.py` вћЎпёЏ `Workers/`
- `*_manager.py`, `heartbeat.py` вћЎпёЏ `Managers/`
- `utils.py`, `parsers.py` вћЎпёЏ `Methods/`
- `config.json`, `oids.json` вћЎпёЏ `Constants/`
- `*_reader.py`, `*_loader.py` вћЎпёЏ `FileReaders/`
- `*_writer.py`, `*_saver.py` вћЎпёЏ `FileWriters/`
- `test_*.py` вћЎпёЏ `Tests/`
- `README.md`, `TOPICS.md` вћЎпёЏ `Documentation/`

### рџ”„ BOOTSTRAP ENTRY.PY
For each module, refactor or create `Entry.py` to export `start()`, `stop()`, and `status()`.

### рџ“‹ AUDIT REPORT
Provide a report for each processed module including: Module Name, Status, Moves, and Entry.py Status.
"""

[blueprint]
settings = { root_name = "OPEN-AIR", apply_init_py = true }
domains = { infrastructure = [ "oaThreadManager", "oaConfiguration", "oaLogging", "oaDependencies", "oaInstallation", "oaOchestration" ], protocols = [ "oaComBroker", "oaComVisa", "oaComMidi", "oaComOSC", "oaComSNMP", "oaSplinker", "oaPTP", "oaTranslator" ], vaults = [ "oaGuiDefinitions", "oaDataRunningFiles", "oaDataLogs", "oaDataCache", "oaDataSNMP", "oaDataSplinks", "oaDataTests" ], gui = [ "oaGuiManager", "oaGuiBuild", "oaGuiDestroy", "oaGuiElements", "oaGuiMediaElements", "oaStyle", "oaGuiTelemetry" ] }
subfolders = { standard = [ "Core", "Workers", "Managers", "Methods", "Constants", "Tests", "Documentation", "Assets", "Interface", "Hooks", "FileReaders", "FileWriters" ] }
