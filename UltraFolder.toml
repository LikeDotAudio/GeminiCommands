| `*_worker.py`, `*_loop.py` | `Workers/` | Pure execution; no state management. |
| `*_manager.py`, `heartbeat.py` | `Managers/` | Lifecycle, restarts, and health monitoring. |
| `utils.py`, `parsers.py` | `Methods/` | Stateless "Skills" used by the worker. |
| `config.json`, `oids.json` | `Constants/` | Immutable values; the module's "Rules." |
| `*_reader.py`, `*_loader.py` | `FileReaders/` | Disk I/O: Pulling data/parsing from files. |
| `*_writer.py`, `*_saver.py` | `FileWriters/` | Disk I/O: Writing data/reports/state to files. |
| `test_*.py` | `Tests/` | Unit and integration testing. |
| `README.md`, `TOPICS.md` | `Documentation/` | Knowledge base for the supervisor. |

