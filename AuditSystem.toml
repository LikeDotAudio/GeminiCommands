description = "Comprehensive System Audit: Performs a high-level review OR executes ALL individual specialized audits if 'all' or 'everything' is specified."
prompt = """
You are the Lead Systems Auditor for OPEN-AIR. Your goal is to provide a forensic, end-to-end evaluation of the entire project.

### 🕹️ EXECUTION MODES:
1.  **Standard Mode**: If no special keywords are provided, perform the 20-point high-level audit described below.
2.  **'Whole Thing' Mode**: If the input includes keywords like `all`, `everything`, `whole thing`, or `all things`, you MUST execute every specialized audit command in the system sequentially.

### 🚀 SPECIALIZED AUDIT SEQUENCE (For 'Whole Thing' Mode):
If in 'Whole Thing' mode, you are directed to run these commands (or simulate their logic) and collect their reports:
- `AuditArchitecture` (DIP, Circular Deps, Layering)
- `AuditFileFolderNames` (12-folder standard, Entry.py, Naming)
- `AuditPerformance` (Resource leaks, N+1, Big-O)
- `AuditLogging` (Zero-cost gates, Emoji grepping, Gravity)
- `AuditErrorHandling` (Try/Except blocks, Tracebacks)
- `AuditThreading` (Race conditions, Deadlocks)
- `AuditSecurity` (Secrets, IAM, CVEs)
- `AuditTests` (Coverage, Mock quality)
- `AuditConfiguration` (Defaults, Validators)

### 📊 REPORTING:
- **Standard Audit**: Save to `oaDataAudits/audit_Code_review.md`.
- **Whole Thing Audit**: Consolidate all specialized findings into a single master report: `oaDataAudits/System_Master_Audit.md`. This report must include an Executive Summary of all subsystems.

---

### 🔍 THE 20-POINT SYSTEM AUDIT (Baseline):
1.  **Dependency Security**: Automated scanning for CVEs.
2.  **IAM & Access**: Least Privilege and service permissions.
3.  **Secrets Management**: Hardcoded keys/tokens.
4.  **Vulnerability & Pen-test**: Simulated attack vectors.
5.  **Data Privacy**: Encryption at rest/transit (GDPR/SOC2).
6.  **Technical Debt**: Legacy bottlenecks and refactor priority.
7.  **Static Analysis**: Code smells and style guide adherence.
8.  **Architecture Design**: Scaling friction and DIP violations.
9.  **Test Coverage**: Unit/E2E completeness.
10. **OS Licensing**: Copyleft check.
11. **Load/Stress**: Degradation points.
12. **DB Performance**: Slow-query logs and schema optimization.
13. **Disaster Recovery**: Backup restorability and RTO.
14. **Infra/Cloud Cost**: Zombie servers and over-provisioning.
15. **Observability**: Centralized logging and forensic utility.
16. **CI/CD Pipeline**: Speed and security gates.
17. **Incident Response**: MTTR and post-mortem learning.
18. **Alert Fatigue**: Pruning noisy/unautionable alerts.
19. **Accessibility (a11y)**: WCAG compliance.
20. **Documentation**: Dead vs. Living runbooks/specs.

### 📋 INSTRUCTIONS:
- Review the entire project.
- Categorize issues: **CRITICAL**, **HIGH**, **MEDIUM**, **LOW**.
- For each issue: File name, code snippet, and a prioritized repair suggestion.
- **Silent/Automated**: If triggered with `all`, perform this as a silent "end of day" audit—exhaustive but concise.
"""
