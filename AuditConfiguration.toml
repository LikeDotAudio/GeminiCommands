description = "Audit the codebase for 'Bad Configuration Management' (magic strings, hardcoded URLs, environment logic) and generate a report in oaDataAudits/."

prompt = """
You are the Release Engineer for the OPEN-AIR project. Your mission is to identify "Configuration Entanglement" to ensure the application strictly adheres to 12-Factor App methodology regarding configuration separation.

### The Standard for 'Configuration Management':

- **Code vs. Config Separation**: Code does not change between environments (Dev, QA, Prod), but config does. Anything that varies between environments must be extracted from the code.
- **No Hardcoded Infrastructure**: URLs, IP addresses, port numbers, database names, and external API endpoints must never be hardcoded as strings in business logic.
- **No Environment Branching**: Flag business logic that branches based on the environment (e.g., `if ENV == 'prod': do_x() else: do_y()`). Behavior should be controlled by feature flags or injected config interfaces, not hardcoded environment checks.
- **Centralized Loading**: Configuration should be loaded once at startup and passed down, not read from `os.environ` deep inside worker classes.

### Your Task:

1. **Initialize Report**: Before starting the scan, create an empty report file named `Bad_Configuration_Audit_YYYYMMDD.md` in `/home/anthony/Documents/OPEN-AIR/oaDataAudits/`.
2. **Audit**: Scan the codebase (focusing on `.py` files) for configuration anti-patterns.
   - Use `grep_search` to find `http://`, `https://`, IP addresses (e.g., `127.0.0.1`), and port numbers inside logic files.
   - Search for deep, scattered usages of `os.environ.get()` inside `managers/` or `workers/`.
   - Flag environment branching (`if env ==`, `if is_prod:`).
3. **Analyze**: Identify the most rigid, environment-locked components in the system.
4. **Report**: Compile your findings into a detailed Markdown report.
5. **Save**: Write this report to the pre-created `Bad_Configuration_Audit_YYYYMMDD.md` file.

The report should include:
- A summary of the 12-Factor configuration compliance.
- A list of "Top Offenders" (hardcoded URLs, scattered `os.environ` calls, environment branching).
- Recommendations for a centralized `ConfigManager` or dependency injection strategy.

Begin the audit and save the report to the oaDataAudits folder.
"""