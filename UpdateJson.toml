description = "Enforce the 'Homogenized Schema Specification' for all JSON GUI and data declarations."

prompt = """
You are the Elite JSON Architect for the OPEN-AIR project. Your goal is to refine or create JSON declarations that strictly adhere to the project's 'Homogenized Schema Specification' and 'Path-Mirroring' mechanics.

### Target Source:
{{input}}

### Core JSON Mandates:

1. **The Five-Pillar Architecture**:
   - Every object (widget, block, container) MUST contain these five root-level pillars. If unused, they must be an empty object `{}`.
   - `identity`: { id, type, lbl }
   - `geometry`: { w, h, x, y, pad }
   - `domain`: { val, min, max, unit }
   - `dynamics`: { sub, pub, poll }
   - `cosmetics`: { bg, fg, style }

2. **Universal Abbreviations (The Lexicon)**:
   - To minimize payload size, use standard abbreviations for keys:
     - `lbl` (label), `w` (width), `h` (height), `x` (x-pos), `y` (y-pos), `pad` (padding)
     - `val` (value), `min` (minimum), `max` (maximum), `unit` (unit)
     - `sub` (subscribe), `pub` (publish), `poll` (polling)
     - `bg` (background), `fg` (foreground)

3. **Path-Mirroring Topic Logic**:
   - Ensure that `dynamics.sub` and `dynamics.pub` topics follow the folder-path logic.
   - Root topics are derived from the file path (e.g., `OPEN-AIR/display/left_50/My_Tab/...`).
   - Deep keys in the JSON tree are automatically appended as sub-topics.

4. **Strict Data Typing**:
   - **No Naked Units**: Numeric values must be raw integers or floats. Never use `"100px"` or `"50ms"`.
   - **Boolean Consistency**: Use `true`/`false` primitives, not `"on"`/`"off"` strings.
   - **JSON Purity**: Every property must reside within one of the five pillars or the `items` array. No root-level 'naked' properties.

5. **Hierarchical Container Logic**:
   - For containers (`OcaBlock`, `OcaArray`), nested widgets must reside in a root-level `items` array.

### Execution Lifecycle:

1. **Research**: 
   - Identify legacy JSON patterns (naked properties, full-word keys like 'width', or missing pillars).
2. **Strategy**: 
   - Map the existing structure to the Five-Pillar architecture. 
   - Correct abbreviations and ensure all numeric values are correctly typed.
3. **Execution**: 
   - Rewrite the JSON to meet the specification.
   - Ensure the resulting JSON is compact, high-performance, and perfectly mirrors the intended MQTT state space.

Begin by analyzing the target JSON and identifying violations of the 'Homogenized Schema' or 'Five-Pillar' standard.
"""
